version: "3.9"

# ─── Port map ────────────────────────────────────────────────────────────────
# 6379  Redis
# 4000  LiteLLM gateway
# 4317  OTel Collector — OTLP gRPC  (Python apps send here)
# 4318  OTel Collector — OTLP HTTP
# 8889  OTel Collector — Prometheus metrics endpoint (internal; scraped by Prometheus)
# 9090  Prometheus
# 3000  Grafana  (open http://localhost:3000, admin/admin)
# ─────────────────────────────────────────────────────────────────────────────

services:
  redis:
    image: redis:7.2-alpine
    container_name: aimesh-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ./redis.conf:/usr/local/etc/redis/redis.conf:ro
      - redis-data:/data
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: aimesh-litellm
    restart: unless-stopped
    ports:
      - "4000:4000"
    volumes:
      - ./litellm_config.yaml:/app/config.yaml:ro
    command: --config /app/config.yaml --port 4000 --num_workers 2
    environment:
      # Required for local dev — override in production via real secrets
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-sk-aimesh-local}
      # Model provider keys — leave blank if that tier isn't in use locally
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - RUNPOD_API_KEY=${RUNPOD_API_KEY:-}
      - RUNPOD_ENDPOINT_ID=${RUNPOD_ENDPOINT_ID:-}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4000/health/liveliness"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.101.0
    container_name: aimesh-otel-collector
    restart: unless-stopped
    ports:
      - "4317:4317"   # OTLP gRPC — Python apps export here
      - "4318:4318"   # OTLP HTTP — alternative export endpoint
      # 8889 is internal only; Prometheus scrapes it over the Docker network
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    # No healthcheck — the distroless image has no shell/wget/curl.
    # The collector logs "Everything is ready" when up; Prometheus will
    # retry scraping until it succeeds.

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: aimesh-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
    depends_on:
      - otel-collector
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:10.4.2
    container_name: aimesh-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/etc/grafana/dashboards/aimesh.json
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
