# litellm_config.yaml — AIMESH LiteLLM gateway configuration
#
# Every model in the mesh is registered here and exposed through one
# OpenAI-compatible endpoint (http://localhost:4000/v1).
#
# Tier legend:
#   tier0  — Edge devices (phones / tablets): MLX / MLC, OpenAI-compatible server
#   tier1  — iGPU laptop: Ollama
#   tier2  — dGPU laptop + desktop PC: Ollama
#   tier3  — RunPod serverless: OpenAI-compatible endpoint
#   tier4  — Cloud: Anthropic Claude
#
# Placeholder model IDs and host names are marked with TODO comments.
# Update them as each device is onboarded (AIMESH-19 through AIMESH-25).
#
# Env vars referenced with os.environ/VAR_NAME are resolved at startup.
# Set them in a .env file or via docker-compose environment: block.

model_list:

  # ---------------------------------------------------------------------------
  # Tier 0 — Edge devices (MLX / MLC)
  # mlx_lm.server exposes an OpenAI-compatible API on port 8080.
  # ---------------------------------------------------------------------------

  - model_name: tier0/llama3.2-3b-ipad1
    litellm_params:
      model: openai/mlx-community/Llama-3.2-3B-Instruct-4bit  # TODO: confirm model ID
      api_base: "http://ipad-1.local:8080/v1"                 # TODO: replace with real hostname/IP
      api_key: "none"

  - model_name: tier0/llama3.2-3b-ipad2
    litellm_params:
      model: openai/mlx-community/Llama-3.2-3B-Instruct-4bit  # TODO: confirm model ID
      api_base: "http://ipad-2.local:8080/v1"                 # TODO: replace with real hostname/IP
      api_key: "none"

  - model_name: tier0/llama3.2-3b-iphone
    litellm_params:
      model: openai/mlx-community/Llama-3.2-3B-Instruct-4bit  # TODO: confirm model ID
      api_base: "http://iphone.local:8080/v1"                 # TODO: replace with real hostname/IP
      api_key: "none"

  - model_name: tier0/llama3.2-3b-android
    litellm_params:
      model: openai/mlx-community/Llama-3.2-3B-Instruct-4bit  # TODO: MLC model ID / server port
      api_base: "http://android-tablet.local:8080/v1"         # TODO: replace with real hostname/IP
      api_key: "none"

  # ---------------------------------------------------------------------------
  # Tier 1 — iGPU laptop (Ollama)
  # ---------------------------------------------------------------------------

  - model_name: tier1/llama3.1-8b
    litellm_params:
      model: ollama/llama3.1:8b                               # TODO: confirm pulled model tag
      api_base: "http://general-laptop.local:11434"           # TODO: replace with real hostname/IP

  # ---------------------------------------------------------------------------
  # Tier 2 — dGPU devices (Ollama)
  # Two devices: desktop PC and gaming laptop (separate Ollama instances).
  # ---------------------------------------------------------------------------

  - model_name: tier2/llama3.1-70b-desktop
    litellm_params:
      model: ollama/llama3.1:70b                              # TODO: confirm pulled model tag
      api_base: "http://desktop-pc.local:11434"              # TODO: replace with real hostname/IP

  - model_name: tier2/mixtral-8x7b-laptop
    litellm_params:
      model: ollama/mixtral:8x7b                             # TODO: confirm pulled model tag
      api_base: "http://gaming-laptop.local:11434"           # TODO: replace with real hostname/IP

  # ---------------------------------------------------------------------------
  # Tier 3 — RunPod serverless
  # Endpoint URL: https://api.runpod.ai/v2/{ENDPOINT_ID}/openai/v1
  # Set RUNPOD_API_KEY and RUNPOD_ENDPOINT_ID in your environment.
  # ---------------------------------------------------------------------------

  - model_name: tier3/llama3.1-70b-runpod
    litellm_params:
      model: openai/meta-llama/Llama-3.1-70B-Instruct        # model served on RunPod worker
      api_base: "https://api.runpod.ai/v2/RUNPOD_ENDPOINT_ID/openai/v1"  # TODO: set RUNPOD_ENDPOINT_ID
      api_key: os.environ/RUNPOD_API_KEY

  # ---------------------------------------------------------------------------
  # Tier 4 — Anthropic Claude (cloud)
  # Set ANTHROPIC_API_KEY in your environment.
  # ---------------------------------------------------------------------------

  - model_name: tier4/claude-sonnet
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: tier4/claude-opus
    litellm_params:
      model: anthropic/claude-opus-4-6
      api_key: os.environ/ANTHROPIC_API_KEY

# ---------------------------------------------------------------------------
# Router settings
# ---------------------------------------------------------------------------

router_settings:
  routing_strategy: least-busy   # prefer devices with fewer in-flight requests
  num_retries: 2
  timeout: 120
  retry_after: 5

# ---------------------------------------------------------------------------
# LiteLLM runtime settings
# ---------------------------------------------------------------------------

litellm_settings:
  drop_params: true        # silently ignore unsupported params per model
  request_timeout: 120     # seconds before a model call times out

# ---------------------------------------------------------------------------
# General / server settings
# ---------------------------------------------------------------------------

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY   # set to sk-aimesh-local for local dev
