# AIMESH Redis configuration
# Tuned for local LAN use: persistence on, pub/sub + streams enabled.

bind 0.0.0.0
port 6379
# LAN-only — firewall handles external access
protected-mode no

# --- Persistence (AOF) ---
appendonly yes
# flush to disk every second (good balance)
appendfsync everysec
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# --- RDB snapshot (safety net) ---
save 900 1
save 300 10
save 60  10000

# --- Memory ---
maxmemory 512mb
maxmemory-policy allkeys-lru

# --- Streams ---
# No extra config needed — streams are a first-class data type.
# Consumer group delivery acknowledgement timeout (10 min).
# Workers claim PEL entries older than this via XAUTOCLAIM.

# --- Logging ---
loglevel notice
# log to stdout (Docker captures it)
logfile ""

# --- Misc ---
# background task frequency
hz 20
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
