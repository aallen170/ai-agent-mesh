name: CI

on:
  pull_request:
    branches: ["main"]

jobs:
  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Smoke test — Redis layer (AIMESH-8)
        run: python scripts/smoke_test_redis.py
        env:
          REDIS_URL: redis://localhost:6379/0

      - name: Smoke test — Device registry (AIMESH-9)
        run: python scripts/smoke_test_registry.py
        env:
          REDIS_URL: redis://localhost:6379/0

      - name: Smoke test — Task router (AIMESH-10)
        run: python scripts/smoke_test_router.py
        env:
          REDIS_URL: redis://localhost:6379/0

      - name: Smoke test — LiteLLM gateway config + client (AIMESH-11)
        # Tests config parsing and GatewayClient construction only.
        # The live health/model checks are skipped when LITELLM_BASE_URL is unset.
        run: python scripts/smoke_test_gateway.py
